<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</head>

<body>
    <header>
        <div class="topmenu">
        <div class="heading">
            <h1>Elegant Notes</h1>
            <p>Share your thoughts and ideas in style</p>
        </div>
    </header>
   
    <nav>
        <div class="searchcont">
            <form action="">
                <input class="search" type="text" placeholder="Search Task">
            </form>
             <button id="add" class="add">Add New</button>
        </div>
       
    </nav>
    </div>


    <!-- input menu  -->
    <div class="inputmenu">
        <div class="inputcontentbox">
            <form action="" class="inputoform">
                <div class="upper">
                <h2>NEW NOTE </h2>
                <button class="deletemodel">X</button>
                </div>
                <h3>Title</h3>
                <input id="titleinput" type="text" autocomplete="off">
                <h3>Content</h3>
                <textarea id="contentinput" placeholder="Enter your notes"></textarea>

                <div class="errormsg">Please fill all fields</div>
                <input id="submitbtn" type="submit" value="save">
            </form>
        </div>
    </div>


        <div class="notesecction notcont">

            <!-- filling it  up dynamically  -->
        </div>
        <div class="nonotes">
            <img src="empty_data_icon_149938.png" alt="">
        </div>
    





</body>
<script src="script.js"></script>

</html>
